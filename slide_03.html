<html data-theme="light" lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            overflow: hidden;
            background-color: #FFFFFF;
        }
        .text-teal-custom { color: #46818E; }
        .bg-teal-custom { background-color: #46818E; }
        .text-orange-custom { color: #EB5A11; }
        .bg-orange-custom { background-color: #EB5A11; }
        .text-purple-custom { color: #8E7CC3; }
        .bg-purple-custom { background-color: #8E7CC3; }
        .border-teal-custom { border-color: #46818E; }
        .border-orange-custom { border-color: #EB5A11; }

        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08);
        }
    </style>
<style id="slide-selected-style">
  [data-slide-selected]::before
  /* [data-slide-hover-selected]::before */ {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    width: 100%;
    height: 100%;
    box-sizing: content-box;
    padding: 4px;
    border-radius: 0px;
    outline: 2px solid #0f7fff !important;
    z-index: 10000;
    pointer-events: none;
  }

 /* [data-slide-hover-selected], */
  [data-slide-selected] {
    position: relative;
    outline: none;
    cursor: default;
  }

  img[data-slide-selected],
  img[data-slide-hover-selected],
  [data-slide-hover-selected],
  [item-slide-click-selected],
  [item-slide-selected] {
    border: 2px solid #0f7fff !important;
  }


</style></head>
<body class="relative">
<div class="relative w-full h-full flex flex-col p-12 box-border">
<!-- Logo Watermark -->
<div class="absolute top-6 right-10 z-20">
<img alt="Logo" class="h-16 w-auto opacity-80" src="https://page.gensparksite.com/slides_images/a3cb0105676f7953f01b66cd6b7a1712.png">
</div>
<!-- Background Elements -->
<div class="absolute bottom-10 left-10 text-[200px] text-gray-50 font-black -z-10 select-none">WHY?</div>
<div class="absolute top-0 right-0 w-1/3 h-full bg-teal-50 -z-10 opacity-40"></div>
<!-- Header -->
<div class="flex flex-col mb-8 z-10">
<div class="flex items-center gap-3 mb-2">
<div class="w-10 h-1 bg-orange-custom"></div>
<span class="text-orange-custom font-bold tracking-widest text-sm uppercase">NECESSITY</span>
</div>
<h2 class="text-5xl font-black text-teal-custom">왜 구조화가 필요한가?</h2>
</div>
<!-- Main Content Grid -->
<div class="flex flex-1 gap-12 z-10 h-full">
<!-- Left Column: Problem Definition -->
<div class="w-5/12 flex flex-col justify-center gap-6">
<!-- Quote Block -->
<div class="relative bg-gray-50 rounded-3xl p-8 border border-gray-100">
<div class="absolute -top-6 -left-2 text-8xl text-orange-custom opacity-20 font-serif">"</div>
<p class="text-2xl font-bold text-gray-700 leading-snug mb-4 relative z-10 text-center">
                        대충 알아서 해줘...
                    </p>
<div class="flex justify-center">
<div class="bg-red-100 text-red-600 px-4 py-1 rounded-full text-sm font-bold flex items-center gap-2">
<i class="fa-solid fa-circle-xmark"></i> AI에게 통하지 않는 말
                        </div>
</div>
</div>
<!-- Explanation -->
<div class="space-y-4 px-2">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center text-teal-custom mt-1 flex-shrink-0">
<i class="fa-solid fa-robot"></i>
</div>
<div>
<p class="text-lg font-bold text-gray-800">AI의 작동 원리</p>
<p class="text-gray-600">명확한 <span class="text-teal-custom font-bold">입력</span>과 <span class="text-teal-custom font-bold">출력</span>이 정의되어야만 일을 시작할 수 있습니다.</p>
</div>
</div>
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center text-orange-custom mt-1 flex-shrink-0">
<i class="fa-solid fa-list-check"></i>
</div>
<div>
<p class="text-lg font-bold text-gray-800">선결 과제</p>
<p class="text-gray-600">일을 맡기려면 먼저 업무를 <span class="border-b-2 border-orange-200 font-bold">잘게 쪼개야 합니다.</span></p>
</div>
</div>
</div>
</div>
<!-- Right Column: Metaphor Visualization -->
<div class="w-7/12 flex flex-col justify-center">
<div class="bg-white rounded-3xl card-shadow border border-gray-100 p-10 h-full max-h-[500px] flex flex-col relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-orange-50 rounded-bl-full -z-0 opacity-50"></div>
<div class="flex items-center gap-3 mb-6 relative z-10">
<span class="bg-teal-custom text-white px-3 py-1 rounded text-xs font-bold uppercase">Analogy</span>
<h3 class="text-2xl font-bold text-gray-800">요리 레시피와 같은 원리</h3>
</div>
<!-- Visual Process Flow -->
<div class="flex-1 flex flex-col justify-center gap-6 relative z-10">
<!-- Step 1: Bad Example -->
<div class="flex items-center gap-6 opacity-40 grayscale">
<div class="w-20 h-20 bg-gray-100 rounded-2xl flex items-center justify-center text-gray-400 text-3xl">
<i class="fa-solid fa-utensils"></i>
</div>
<div class="flex-1 border-l-4 border-gray-300 pl-6 py-2">
<p class="text-xl font-bold text-gray-400">"맛있는 거 만들어줘"</p>
<p class="text-sm text-gray-400">모호한 요청 = 실패하거나 엉뚱한 결과</p>
</div>
</div>
<!-- Arrow Down -->
<div class="flex justify-center -my-2 pl-10">
<i class="fa-solid fa-arrow-down text-gray-300 text-xl"></i>
</div>
<!-- Step 2: Good Example -->
<div class="flex items-center gap-6">
<div class="w-20 h-20 bg-teal-50 rounded-2xl flex items-center justify-center text-teal-custom text-3xl border border-teal-100 shadow-sm">
<i class="fa-solid fa-list-ol"></i>
</div>
<div class="flex-1 border-l-4 border-orange-custom pl-6 py-2 bg-orange-50 rounded-r-xl">
<p class="text-xl font-bold text-gray-800">"단계별 레시피"</p>
<div class="flex gap-2 mt-2">
<span class="px-2 py-1 bg-white rounded text-xs text-gray-600 border border-gray-200">1. 재료 준비</span>
<span class="px-2 py-1 bg-white rounded text-xs text-gray-600 border border-gray-200">2. 손질하기</span>
<span class="px-2 py-1 bg-white rounded text-xs text-gray-600 border border-gray-200">3. 볶기</span>
</div>
</div>
</div>
</div>
<!-- Bottom Message -->
<div class="mt-8 pt-6 border-t border-gray-100 text-center">
<p class="text-lg text-teal-custom font-bold">
<i class="fa-regular fa-lightbulb mr-2"></i>
                            구조화된 지시만이 AI를 움직일 수 있습니다
                        </p>
</div>
</div>
</div>
</div>
</div>

<script src="https://www.genspark.ai/slide-inner.js?_v=1"></script></body></html>
